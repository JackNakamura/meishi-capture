<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>名刺フォロー</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root {
  --bg: #0e0e0f;
  --surface: #1a1a1c;
  --surface2: #242426;
  --border: #2e2e32;
  --text: #f0ede8;
  --muted: #888580;
  --accent: #e8c87a;
  --accent-dim: rgba(232,200,122,0.12);
  --danger: #e07060;
  --success: #6db88a;
  --info: #4a90d9;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,'Hiragino Sans','Noto Sans JP',sans-serif; min-height: 100vh; }

/* Header */
.header { padding: 1rem 1.25rem 0; border-bottom: 0.5px solid var(--border); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.header-title { font-size: 17px; font-weight: 600; }
.header-date { font-size: 11px; color: var(--muted); }
.drive-btn { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 0.5px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.drive-btn.connected { border-color: var(--success); color: var(--success); }

/* Tabs */
.tabs { display: flex; gap: 0; }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Container */
.container { padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; padding-bottom: 2rem; }
.tab-content { display: none; }
.tab-content.active { display: flex; flex-direction: column; gap: 1.25rem; }

/* Labels */
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

/* API Key (collapsible) */
.apikey-box { border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface); overflow: hidden; }
.apikey-box summary { cursor: pointer; font-size: 12px; color: var(--muted); padding: 10px 14px; list-style: none; display: flex; align-items: center; justify-content: space-between; }
.apikey-box summary::-webkit-details-marker { display: none; }
.apikey-box summary::after { content: '▾'; color: var(--muted); font-size: 10px; margin-left: 8px; }
.apikey-box[open] summary { border-bottom: 0.5px solid var(--border); }
.apikey-box[open] summary::after { content: '▴'; }
.apikey-badge { font-size: 11px; color: var(--muted); }
.apikey-badge.ok { color: var(--success); }
.apikey-body { padding: 12px 14px; }
.apikey-row { display: flex; gap: 8px; }
.apikey-row input { flex: 1; border-radius: var(--radius-sm); border: 0.5px solid var(--border); padding: 10px 12px; font-size: 13px; font-family: monospace; color: var(--text); background: var(--bg); outline: none; }
.apikey-row input:focus { border-color: var(--accent); }
.apikey-save { padding: 10px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--accent); background: var(--accent-dim); color: var(--accent); font-size: 13px; cursor: pointer; white-space: nowrap; }
.apikey-status { font-size: 12px; color: var(--muted); margin-top: 6px; }
.apikey-status.ok { color: var(--success); }

/* Inputs */
textarea, .text-input { width: 100%; border-radius: var(--radius); border: 0.5px solid var(--border); padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface); resize: none; line-height: 1.6; outline: none; transition: border-color 0.15s; }
textarea:focus, .text-input:focus { border-color: var(--accent); }
textarea::placeholder, .text-input::placeholder { color: var(--muted); }
input.text-input { height: 46px; }

/* Buttons */
.btn-primary { width: 100%; padding: 15px; border-radius: var(--radius); border: none; background: var(--accent); color: #1a1400; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary:not(:disabled):hover { opacity: 0.9; }
.btn-secondary { width: 100%; padding: 12px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn-secondary:hover { background: var(--surface2); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

/* Voice button */
.voice-btn { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); color: var(--muted); font-size: 14px; cursor: pointer; width: 100%; transition: all 0.15s; }
.voice-btn.recording { border-color: var(--danger); color: var(--danger); background: rgba(224,112,96,0.08); }
.voice-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.voice-btn.recording .voice-dot { background: var(--danger); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Results */
.result-card { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
.result-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 0.5px solid var(--border); background: var(--surface2); }
.result-name { font-size: 14px; font-weight: 500; }
.result-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.action-btn { font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; text-decoration: none; transition: all 0.12s; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.saved { border-color: var(--success); color: var(--success); }
.result-body { padding: 14px; font-family: 'Courier New',monospace; font-size: 11.5px; white-space: pre-wrap; line-height: 1.65; color: #c8c4bc; max-height: 320px; overflow-y: auto; }
.spinner { width: 16px; height: 16px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; display: inline-block; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Search results */
.person-list { display: flex; flex-direction: column; gap: 8px; }
.person-item { padding: 12px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); cursor: pointer; transition: border-color 0.15s; }
.person-item:hover { border-color: var(--accent); }
.person-name { font-size: 14px; font-weight: 500; }
.person-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 999px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }

/* Empty state */
.empty { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 14px; line-height: 1.8; }

/* Select */
select { border-radius: var(--radius); border: 0.5px solid var(--border); padding: 10px 12px; font-size: 14px; color: var(--text); background: var(--surface); outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">名刺フォロー</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="drive-btn" id="driveBtn" onclick="toggleDrive()">
      <span id="driveIcon">⬡</span>
      <span id="driveLabel">Drive/Gmail接続</span>
    </button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('main')">📝 メモ & メール</div>
    <div class="tab" onclick="switchTab('followup')">⏰ フォロー</div>
  </div>
</div>

<div class="container">

  <!-- TAB: MAIN -->
  <div class="tab-content active" id="tab-main">

    <details class="apikey-box" id="apiKeyBox">
      <summary>
        <span>⚙️ Anthropic APIキー（メール生成用）</span>
        <span class="apikey-badge" id="apiKeyBadge">未設定</span>
      </summary>
      <div class="apikey-body">
        <div class="apikey-row">
          <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
          <button class="apikey-save" onclick="saveApiKey()">保存</button>
        </div>
        <div class="apikey-status" id="apiKeyStatus">未設定</div>
      </div>
    </details>

    <div>
      <div class="section-label">相手を検索（氏名・会社名）</div>
      <input type="text" class="text-input" id="searchInput" placeholder="例：TDK、古賀、JCC、ABE TOSHIYUKI" oninput="searchPeople()">
      <div id="searchResults" class="person-list" style="margin-top:8px;"></div>
    </div>

    <div id="personSection" style="display:none; flex-direction:column; gap:1rem;">
      <div id="selectedPersonInfo" style="padding:12px 14px; background:var(--accent-dim); border-radius:var(--radius); border:0.5px solid var(--accent);"></div>

      <div>
        <div class="section-label">会話メモ</div>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
          <div class="voice-dot"></div>
          <span id="voiceLabel">マイクで話す</span>
        </button>
        <textarea id="memoTextarea" style="margin-top:8px; min-height:100px;" placeholder="今日の会話・印象・気になったこと..."></textarea>
      </div>

      <div>
        <div class="section-label">きっかけ・場所（メール生成に利用）</div>
        <input type="text" class="text-input" id="contextInput" placeholder="例：JCC懇親会、XX氏のご紹介、HRセミナー">
      </div>

      <div>
        <div class="section-label">ステータス（任意）</div>
        <div style="display:flex;gap:8px;">
          <select id="importanceSelect" style="flex:1;">
            <option value="">重要度（変更なし）</option>
            <option value="高">🔴 高</option>
            <option value="中">🟡 中</option>
            <option value="低">⚪ 低</option>
          </select>
          <select id="followSelect" style="flex:1;">
            <option value="">フォロー要否（変更なし）</option>
            <option value="YES">✅ 必要</option>
            <option value="NO">— 不要</option>
          </select>
        </div>
      </div>

      <button class="btn-primary" id="generateEmailBtn" onclick="saveAndGenerateEmail()">📧 Gmail下書き + メモ保存</button>
      <button class="btn-secondary" id="saveMemoOnlyBtn" onclick="saveMemoOnly()">メモのみ保存</button>
      <button class="btn-secondary" onclick="clearPersonForm()">キャンセル</button>

      <div id="draftPreview" style="display:none;"></div>
    </div>

  </div>

  <!-- TAB: FOLLOWUP -->
  <div class="tab-content" id="tab-followup">
    <div class="empty">
      ⏰ フォローアップ機能<br><br>
      次回連絡目安が近い人を自動抽出する機能は<br>
      Phase 2 で実装予定です。
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const GOOGLE_CLIENT_ID = '1017711631388-9kqufvefuc041ajrg36ds70h5amqd3cv.apps.googleusercontent.com';
const DRIVE_FOLDER_NAME = 'life/contacts/people';
const SHEET_ID = '1oVg-SZZQd0u-IA_YMJHIKPkJy4NcH23P5cj5yDPiW80';

const SIGNATURE = `--
Jack Nakamura (中村 勝宏)
Asian Identity Co., Ltd. | 代表 / HRコンサルタント
Bangkok, Thailand
Web: http://asian-identity.com/
Tel: +66-2-115-9655`;

// State
let accessToken = null;
let driveFolderId = null;
let anthropicKey = '';
let recognition = null;
let isRecording = false;
let selectedPerson = null;
let cachedPeople = [];

// Init
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

(function() {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) {
    anthropicKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apiKeyStatus').textContent = '設定済み ✓';
    document.getElementById('apiKeyStatus').className = 'apikey-status ok';
    document.getElementById('apiKeyBadge').textContent = '✓ 設定済み';
    document.getElementById('apiKeyBadge').className = 'apikey-badge ok';
  }
})();

// ── Tabs ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['main','followup'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── API Key ──
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  const badge = document.getElementById('apiKeyBadge');
  const status = document.getElementById('apiKeyStatus');
  if (!val || val.length < 20) {
    anthropicKey = '';
    localStorage.removeItem('anthropic_key');
    status.textContent = '未設定'; status.className = 'apikey-status';
    badge.textContent = '未設定'; badge.className = 'apikey-badge';
    return;
  }
  anthropicKey = val;
  localStorage.setItem('anthropic_key', val);
  status.textContent = '設定済み ✓'; status.className = 'apikey-status ok';
  badge.textContent = '✓ 設定済み'; badge.className = 'apikey-badge ok';
  document.getElementById('apiKeyBox').open = false;
  showToast('APIキーを保存しました');
}

// ── Google 接続 ──
function toggleDrive() {
  if (accessToken) {
    accessToken = null; driveFolderId = null; cachedPeople = [];
    document.getElementById('driveBtn').classList.remove('connected');
    document.getElementById('driveIcon').textContent = '⬡';
    document.getElementById('driveLabel').textContent = 'Drive/Gmail接続';
    showToast('接続解除しました');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.compose',
    callback: async (res) => {
      if (res.error) { showToast('接続エラー: '+res.error); return; }
      accessToken = res.access_token;
      document.getElementById('driveBtn').classList.add('connected');
      document.getElementById('driveIcon').textContent = '✓';
      document.getElementById('driveLabel').textContent = '接続中';
      showToast('接続しました');
      driveFolderId = await ensureFolder(DRIVE_FOLDER_NAME);
      await ensureSheetHeader();
    }
  });
  client.requestAccessToken({ prompt:'' });
}

async function ensureFolder(path) {
  const parts = path.split('/');
  let parentId = 'root';
  for (const part of parts) {
    const q = `name='${part}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
    const res = await gapiReq(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
    parentId = res.files?.length ? res.files[0].id : (await gapiReq('https://www.googleapis.com/drive/v3/files','POST',{name:part,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})).id;
  }
  return parentId;
}

async function gapiReq(url, method='GET', body=null) {
  const opts = { method, headers:{ Authorization:`Bearer ${accessToken}`, 'Content-Type':'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(url,opts)).json();
}

// ── Sheet header ──
async function ensureSheetHeader() {
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:H1`,
      { headers: { Authorization: `Bearer ${accessToken}` } });
    const data = await res.json();
    if (!data.values || data.values.length === 0) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:H1?valueInputOption=RAW`,{
        method: 'PUT',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [['日付','氏名','会社','役職','イベント','メールアドレス','最終連絡日','会話メモ']] })
      });
    }
  } catch(e) { console.error('Sheet header error:', e); }
}

// ── People cache (paginated) ──
async function loadPeopleCache() {
  if (!driveFolderId) driveFolderId = await ensureFolder(DRIVE_FOLDER_NAME);
  const all = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/drive/v3/files?q='${driveFolderId}' in parents and mimeType='text/markdown' and trashed=false&fields=files(id,name),nextPageToken&orderBy=createdTime desc&pageSize=1000` + (pageToken ? `&pageToken=${pageToken}` : '');
    const res = await gapiReq(url);
    (res.files || []).forEach(f => all.push(f));
    pageToken = res.nextPageToken || '';
  } while (pageToken);
  cachedPeople = all.map(f => {
    const stem = f.name.replace(/\.md$/, '');
    const sep = stem.indexOf('_');
    const name = sep === -1 ? stem : stem.slice(0, sep);
    const company = sep === -1 ? '' : stem.slice(sep + 1);
    return { id: f.id, name, company, filename: f.name };
  });
}

// ── Metadata parse (Eight format + scan format 両対応) ──
function parseMetadata(content) {
  const meta = { name:'', company:'', role:'', email:'', date:'', importance:'', follow:'' };
  const fm = content.match(/^---\n([\s\S]*?)\n---/);
  if (fm) {
    // Eight format
    const f = fm[1];
    meta.name    = (f.match(/^name:\s*(.+)$/m)    || [,''])[1].trim();
    meta.company = (f.match(/^company:\s*(.+)$/m) || [,''])[1].trim();
    meta.role    = (f.match(/^title:\s*(.+)$/m)   || [,''])[1].trim();
    meta.date    = (f.match(/^date:\s*(.+)$/m)    || [,''])[1].trim();
    meta.email   = (content.match(/\|\s*メール\s*\|\s*([^|\n]+?)\s*\|/) || [,''])[1].trim();
  } else {
    // scan format
    meta.name       = (content.match(/^# (.+)/m)            || [,''])[1].trim();
    meta.company    = (content.match(/会社:\s*([^/\n]+)/)    || [,''])[1].trim();
    meta.role       = (content.match(/役職:\s*([^\n]+)/)     || [,''])[1].trim();
    meta.date       = (content.match(/出会い:\s*(\S+)/)      || [,''])[1].trim();
    meta.email      = (content.match(/Email:\s*([^\n]+)/)   || [,''])[1].trim();
    meta.importance = (content.match(/重要度:\s*(.+)/)       || [,''])[1].trim();
    meta.follow     = (content.match(/フォロー要:\s*(.+)/)   || [,''])[1].trim();
  }
  if (meta.email.includes('不明') || meta.email === '—' || meta.email === '-') meta.email = '';
  return meta;
}

// ── Search ──
async function searchPeople() {
  const query = document.getElementById('searchInput').value.trim();
  const container = document.getElementById('searchResults');
  if (!query || query.length < 2) { container.innerHTML = ''; return; }
  if (!accessToken) { showToast('まず Drive/Gmail に接続してください'); return; }
  if (cachedPeople.length === 0) {
    container.innerHTML = '<div class="empty"><span class="spinner"></span> 人物リストを読み込み中...</div>';
    try { await loadPeopleCache(); }
    catch(e) { container.innerHTML = '<div class="empty">読み込み失敗: ' + escHtml(e.message) + '</div>'; return; }
  }
  const lower = query.toLowerCase();
  const matched = cachedPeople.filter(p =>
    p.name.toLowerCase().includes(lower) ||
    p.company.toLowerCase().includes(lower)
  );
  if (matched.length === 0) {
    container.innerHTML = '<div class="empty">見つかりませんでした</div>';
    return;
  }
  container.innerHTML = matched.slice(0,10).map(p => `
    <div class="person-item" onclick="selectPerson('${p.id}')">
      <div class="person-name">${escHtml(p.name)}</div>
      <div class="person-sub">${escHtml(p.company)}</div>
    </div>`).join('') +
    (matched.length > 10 ? `<div class="empty" style="padding:0.5rem;">他 ${matched.length - 10} 件。検索語を絞ってください</div>` : '');
}

async function selectPerson(fileId) {
  const p = cachedPeople.find(x => x.id === fileId);
  if (!p) return;
  selectedPerson = p;
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${p.id}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } });
    const content = await res.text();
    selectedPerson.content = content;
    const meta = parseMetadata(content);
    selectedPerson.meta = meta;

    document.getElementById('selectedPersonInfo').innerHTML =
      `<div style="font-weight:500;font-size:14px;">${escHtml(meta.name || p.name)}</div>
       <div style="font-size:12px;color:var(--muted);margin-top:2px;">${escHtml(meta.company || p.company)}${meta.role ? ' / '+escHtml(meta.role):''}</div>
       <div style="font-size:12px;margin-top:4px;">${meta.email ? '📧 '+escHtml(meta.email) : '<span style="color:var(--danger)">メアド未登録 — メール下書きは使えません</span>'}</div>`;

    document.getElementById('personSection').style.display = 'flex';
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('memoTextarea').value = '';
    document.getElementById('contextInput').value = '';
    document.getElementById('importanceSelect').value = '';
    document.getElementById('followSelect').value = '';
    document.getElementById('draftPreview').style.display = 'none';
    document.getElementById('draftPreview').innerHTML = '';

    document.getElementById('generateEmailBtn').disabled = !meta.email || !anthropicKey;
  } catch(e) { showToast('読み込みエラー: '+e.message); }
}

// ── Save to Markdown + Sheet ──
async function saveMemoToMarkdown(memo, importance, follow) {
  const today = new Date().toISOString().split('T')[0];
  let content = selectedPerson.content;

  if (memo) {
    const lines = memo.split('\n').filter(l=>l.trim()).map(l=>`- [${today}] ${l}`).join('\n');
    if (content.includes('## 会話メモ')) {
      content = content.replace('- （ここに後で追記）', '');
      content = content.replace('## 会話メモ\n', `## 会話メモ\n${lines}\n`);
    } else if (/## メモ\s*\n/.test(content)) {
      content = content.replace(/## メモ\s*\n/, `## メモ\n${lines}\n`);
    } else {
      content += `\n\n## メモ\n${lines}\n`;
    }
  }
  if (importance && /重要度:/.test(content)) {
    content = content.replace(/重要度:\s*.+/, `重要度: ${importance}`);
  }
  if (follow && /フォロー要:/.test(content)) {
    content = content.replace(/フォロー要:\s*.+/, `フォロー要: ${follow}`);
  }
  if (memo) {
    if (content.includes('## 連絡履歴')) {
      content = content.replace('## 連絡履歴\n', `## 連絡履歴\n- ${today}: メモ追加\n`);
    } else {
      content += `\n## 連絡履歴\n- ${today}: メモ追加\n`;
    }
  }

  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${selectedPerson.id}?uploadType=media`,{
    method: 'PATCH',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'text/markdown' },
    body: content
  });
  selectedPerson.content = content;
  return today;
}

async function upsertSheetRow({ meta, lastContact, memoExcerpt, event }) {
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:H`,
      { headers: { Authorization: `Bearer ${accessToken}` } });
    const rows = (await res.json()).values || [];
    const nameKey = (meta.name||'').trim();
    const compKey = (meta.company||'').trim();
    const idx = rows.findIndex((r,i) => i>0 && (r[1]||'').trim() === nameKey && (r[2]||'').trim() === compKey);
    if (idx === -1) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A:H:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[meta.date || lastContact, meta.name, meta.company, meta.role, event || '', meta.email || '', lastContact, memoExcerpt || '']] })
      });
    } else {
      const row = rows[idx];
      const newMemo = memoExcerpt ? (row[7] ? row[7] + ' | ' + memoExcerpt : memoExcerpt) : (row[7]||'');
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A${idx+1}:H${idx+1}?valueInputOption=RAW`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[row[0]||meta.date||lastContact, meta.name, meta.company, meta.role, event || row[4] || '', meta.email || row[5] || '', lastContact, newMemo]] })
      });
    }
  } catch(e) { console.error('Sheet upsert error:', e); }
}

// ── Memo only ──
async function saveMemoOnly() {
  if (!selectedPerson) return;
  const memo = document.getElementById('memoTextarea').value.trim();
  const importance = document.getElementById('importanceSelect').value;
  const follow = document.getElementById('followSelect').value;
  const context = document.getElementById('contextInput').value.trim();
  if (!memo && !importance && !follow) { showToast('メモを入力してください'); return; }

  const btn = document.getElementById('saveMemoOnlyBtn');
  btn.textContent = '保存中...'; btn.disabled = true;
  try {
    const today = await saveMemoToMarkdown(memo, importance, follow);
    await upsertSheetRow({ meta: selectedPerson.meta, lastContact: today, memoExcerpt: memo.slice(0,100), event: context });
    showToast(`${selectedPerson.meta.name || selectedPerson.name} のメモを保存しました`);
    clearPersonForm();
  } catch(e) {
    showToast('エラー: '+e.message);
  } finally {
    btn.textContent = 'メモのみ保存'; btn.disabled = false;
  }
}

// ── Email generation + Gmail draft ──
async function saveAndGenerateEmail() {
  if (!selectedPerson) return;
  const meta = selectedPerson.meta;
  if (!meta.email) { showToast('メアドが未登録です'); return; }
  if (!anthropicKey) { showToast('APIキーを設定してください'); return; }

  const memo = document.getElementById('memoTextarea').value.trim();
  const context = document.getElementById('contextInput').value.trim();
  const importance = document.getElementById('importanceSelect').value;
  const follow = document.getElementById('followSelect').value;

  const btn = document.getElementById('generateEmailBtn');
  const orig = btn.textContent;
  btn.textContent = '生成中...'; btn.disabled = true;
  try {
    const today = await saveMemoToMarkdown(memo, importance, follow);
    await upsertSheetRow({ meta, lastContact: today, memoExcerpt: memo.slice(0,100), event: context });

    const { subject, body } = await generateEmail(meta, context, memo);
    const fullBody = body + '\n\n' + SIGNATURE;
    await createGmailDraft(meta.email, meta.name, subject, fullBody);

    document.getElementById('draftPreview').style.display = 'block';
    document.getElementById('draftPreview').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-name">Gmail下書き作成完了</div>
          <div class="result-actions">
            <a href="https://mail.google.com/mail/u/0/#drafts" target="_blank" class="action-btn saved">Gmail で開く ↗</a>
          </div>
        </div>
        <div class="result-body">件名: ${escHtml(subject)}

To: ${escHtml(meta.email)}

${escHtml(fullBody)}</div>
      </div>`;
    showToast('下書きを作成しました');
  } catch(e) {
    showToast('エラー: '+e.message);
  } finally {
    btn.textContent = orig; btn.disabled = false;
  }
}

async function generateEmail(meta, eventContext, conversationMemo) {
  const prompt = `あなたはタイ・バンコク在住のHRコンサルタント「Jack Nakamura (中村 勝宏)」(Asian Identity Co., Ltd. 代表)として、名刺交換後のお礼メールを日本語で書いてください。

【相手情報】
氏名: ${meta.name}
会社: ${meta.company}
役職: ${meta.role}

【きっかけ・場所】
${eventContext || '（未記入）'}

【会話メモ】
${conversationMemo || '（特になし）'}

【要件】
- 宛名は「${meta.company}\n${meta.role} ${meta.name}様」の形式（会社と氏名は改行で分ける）
- 丁寧だが堅すぎず、ビジネスで信頼感を与える文体
- 250〜350字程度
- 会話メモに具体的内容があれば1文だけ自然に触れる（「〜について伺えて」など）
- 「今後ともよろしくお願いいたします」で締める
- 署名は書かない（自動で付与される）

【出力形式】
件名: <簡潔な件名>

<本文>`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
  if (!data.content) throw new Error('レスポンス異常');
  const text = data.content.map(b => b.text || '').join('').trim();
  const subMatch = text.match(/件名:\s*(.+)/);
  const subject = subMatch ? subMatch[1].trim() : `ご挨拶 / Asian Identity 中村`;
  const body = text.replace(/^[\s\S]*?件名:\s*.+\n+/, '').trim();
  return { subject, body };
}

async function createGmailDraft(to, toName, subject, body) {
  const utf8b64 = (s) => btoa(unescape(encodeURIComponent(s)));
  const encSubject = `=?UTF-8?B?${utf8b64(subject)}?=`;
  const toHeader = toName ? `=?UTF-8?B?${utf8b64(toName)}?= <${to}>` : to;
  const message = [
    `To: ${toHeader}`,
    `Subject: ${encSubject}`,
    `MIME-Version: 1.0`,
    `Content-Type: text/plain; charset=UTF-8`,
    `Content-Transfer-Encoding: 8bit`,
    ``,
    body
  ].join('\r\n');
  const encoded = utf8b64(message)
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: { raw: encoded } })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

function clearPersonForm() {
  selectedPerson = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('personSection').style.display = 'none';
  document.getElementById('memoTextarea').value = '';
  document.getElementById('contextInput').value = '';
  document.getElementById('draftPreview').style.display = 'none';
  document.getElementById('draftPreview').innerHTML = '';
}

// ── Voice ──
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('このブラウザは音声入力非対応です');
    return;
  }
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  const base = document.getElementById('memoTextarea').value;
  recognition.onresult = e => {
    let interim = '', final = base;
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    document.getElementById('memoTextarea').value = final + interim;
  };
  recognition.onend = () => setRecording(false);
  recognition.start();
  setRecording(true);
}

function setRecording(v) {
  isRecording = v;
  const btn = document.getElementById('voiceBtn');
  btn.classList.toggle('recording', v);
  document.getElementById('voiceLabel').textContent = v ? '録音中… タップで停止' : 'マイクで話す';
}

// ── Utils ──
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
